services:
  postgres:
    image: postgres:16-alpine
    container_name: isfam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: isfam
      POSTGRES_PASSWORD: isfam
      POSTGRES_DB: isfam
    ports:
      - "5433:5432"
    volumes:
      - isfam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isfam -d isfam"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  isfam_postgres_data:
